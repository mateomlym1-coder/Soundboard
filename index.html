"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: radial-gradient(circle, #1a1c2e 0%, #070814 100%); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { text-align: center; background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); width: 90%; max-width: 420px; }
        h1 { font-size: 2rem; color: #ff5722; text-shadow: 0 0 10px rgba(255, 87, 34, 0.5); margin-bottom: 2px; }
        .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #score-panel { font-size: 3.5rem; font-weight: bold; color: #00ffcc; text-shadow: 0 0 15px rgba(0, 255, 204, 0.4); margin-bottom: 5px; }
        #cps-panel { font-size: 1rem; color: #ffeb3b; margin-bottom: 20px; font-weight: 600; }
        #target-btn { width: 140px; height: 140px; border-radius: 50%; border: none; background: linear-gradient(135deg, #ff5722 0%, #ff9800 100%); font-size: 3.5rem; cursor: pointer; outline: none; box-shadow: 0 8px 25px rgba(255,87,34,0.4); transition: transform 0.05s ease; margin-bottom: 25px; display: inline-flex; align-items: center; justify-content: center; }
        #target-btn:active { transform: scale(0.90); }
        .shop-section { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .shop-title { font-size: 0.9rem; text-align: left; margin-bottom: 10px; color: #aaa; font-weight: bold; text-transform: uppercase; }
        .upgrade-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .upgrade-info { text-align: left; }
        .upgrade-name { font-weight: bold; font-size: 0.95rem; color: #fff; }
        .upgrade-cost { font-size: 0.85rem; color: #00ffcc; }
        #buy-autoclicker { background: #00bcd4; color: #fff; border: none; padding: 8px 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        #buy-autoclicker:hover { background: #00e5ff; }
        #buy-autoclicker:disabled { background: #444; color: #888; cursor: not-allowed; }
        .btn-panel { display: flex; flex-direction: column; gap: 10px; }
        button.action-btn { width: 100%; padding: 12px; font-size: 0.95rem; font-weight: bold; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
        #ad-btn { background: #9c27b0; box-shadow: 0 4px 15px rgba(156, 39, 176, 0.2); }
        #ad-btn:hover { opacity: 0.9; }
        #ad-btn:disabled { background: #444; opacity: 0.6; cursor: not-allowed; }
        #reset-btn { background: transparent; color: #666; font-size: 0.8rem; padding: 4px; }
        #reset-btn:hover { color: #ff3333; }
        #status-msg { margin-top: 15px; font-size: 0.8rem; color: #888; min-height: 18px; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>CRAZY CLICKER</h1>
        <div class="subtitle">Deluxe Edition</div>
        
        <div id="score-panel">0</div>
        <div id="cps-panel">Autopilot: 0 clicks/sec</div>
        
        <button id="target-btn">🎮</button>
        
        <div class="shop-section">
            <div class="shop-title">Upgrades Shop</div>
            <div class="upgrade-row">
                <div class="upgrade-info">
                    <div class="upgrade-name">Auto-Bot (<span id="auto-count">0</span>)</div>
                    <div class="upgrade-cost">Cost: <span id="auto-cost">15</span> pts</div>
                </div>
                <button id="buy-autoclicker">BUY +1 CPS</button>
            </div>
        </div>
        
        <div class="btn-panel">
            <button id="ad-btn" class="action-btn">🎬 Watch Ad (+50 Points)</button>
            <button id="reset-btn" class="action-btn">Wipe Save Data</button>
        </div>

        <div id="status-msg">Loading SDK Link...</div>
    </div>

    <script>
        // Game State Variables
        let score = 0;
        let autoclickers = 0;
        let autoclickerCost = 15;
        let crazySDK = null;

        // DOM Setup Elements
        const scoreDisplay = document.getElementById('score-panel');
        const cpsDisplay = document.getElementById('cps-panel');
        const targetBtn = document.getElementById('target-btn');
        const adBtn = document.getElementById('ad-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusMsg = document.getElementById('status-msg');
        const autoCountDisplay = document.getElementById('auto-count');
        const autoCostDisplay = document.getElementById('auto-cost');
        const buyAutoclickerBtn = document.getElementById('buy-autoclicker');

        // Load Persistent Browser Saves
        if (localStorage.getItem('cc_deluxe_score')) {
            score = parseInt(localStorage.getItem('cc_deluxe_score'), 10);
            autoclickers = parseInt(localStorage.getItem('cc_deluxe_autos'), 10) || 0;
            autoclickerCost = parseInt(localStorage.getItem('cc_deluxe_cost'), 10) || 15;
        }

        // Initialize Official SDK Wrapper Framework
        window.addEventListener('DOMContentLoaded', async () => {
            if (window.CrazyGames && window.CrazyGames.SDK) {
                try {
                    crazySDK = window.CrazyGames.SDK;
                    statusMsg.innerText = "CrazyGames Portal System Linked.";
                    crazySDK.game.loadingStop();
                } catch (e) {
                    statusMsg.innerText = "Running Dev Mode Local Sandbox.";
                }
            } else {
                statusMsg.innerText = "Running Dev Mode Local Sandbox.";
            }
            updateUI();
        });

        // Main Controller Click Event
        targetBtn.addEventListener('click', () => {
            score += 1;
            updateUI();
            saveProgress();
            
            if (crazySDK) {
                crazySDK.game.gameplayStart();
            }
        });

        // Buy Automated Upgrades System
        buyAutoclickerBtn.addEventListener('click', () => {
            if (score >= autoclickerCost) {
                score -= autoclickerCost;
                autoclickers += 1;
                autoclickerCost = Math.floor(autoclickerCost * 1.5); // Increase cost scale
                
                updateUI();
                saveProgress();
                statusMsg.innerText = "Purchased Auto-Bot unit successfully!";
            }
        });

        // 1-Second Automation Engine Pulse Loop
        setInterval(() => {
            if (autoclickers > 0) {
                score += autoclickers;
                updateUI();
                saveProgress();
            }
        }, 1000);

        // Ad Rewarded Payout Trigger
        adBtn.addEventListener('click', () => {
            statusMsg.innerText = "Opening Ad Frame Stream...";
            adBtn.disabled = true;

            if (crazySDK) {
                crazySDK.ad.requestAd("rewarded", {
                    adStarted: () => { statusMsg.innerText = "Ad running..."; },
                    adFinished: () => {
                        score += 50; // Doubled payout for upgraded version
                        adBtn.disabled = false;
                        updateUI();
                        saveProgress();
                        statusMsg.innerText = "Bonus +50 Points Applied!";
                    },
                    adError: (err) => {
                        adBtn.disabled = false;
                        statusMsg.innerText = "Ad system timed out. Try again.";
                    }
                });
            } else {
                // Sandbox Emulator Mode
                setTimeout(() => {
                    score += 50;
                    adBtn.disabled = false;
                    updateUI();
                    saveProgress();
                    statusMsg.innerText = "[Sandbox Check] Added +50 bonus pts.";
                }, 1200);
            }
        });

        // Data Reset Management
        resetBtn.addEventListener('click', () => {
            if (confirm("Reset everything back to zero?")) {
                score = 0;
                autoclickers = 0;
                autoclickerCost = 15;
                updateUI();
                saveProgress();
                statusMsg.innerText = "All local engine save state files cleared.";
            }
        });

        // Core Visual View Management Sync
        function updateUI() {
            scoreDisplay.innerText = score;
            cpsDisplay.innerText = `Autopilot: ${autoclickers} clicks/sec`;
            autoCountDisplay.innerText = autoclickers;
            autoCostDisplay.innerText = autoclickerCost;
            
            // Toggle buy button state safely
            buyAutoclickerBtn.disabled = (score < autoclickerCost);
        }

        // Local Browser Save Layer
        function saveProgress() {
            localStorage.setItem('cc_deluxe_score', score);
            localStorage.setItem('cc_deluxe_autos', autoclickers);
            localStorage.setItem('cc_deluxe_cost', autoclickerCost);
        }
    </script>
</body>
</html>
